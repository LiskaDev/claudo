<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepSeek Timeline UI — Demo</title>
  <meta name="description" content="A live demo of the DeepSeek-style compact timeline navigator sidebar, built with vanilla HTML/CSS/JS." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* =========================================================
       RESET & CSS VARIABLES
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:               #f9f8f7;
      --bg-panel:         #ffffff;
      --border:           #e5e0d8;
      --text-primary:     #1a1a1a;
      --text-secondary:   #374151;
      --text-muted:       #9ca3af;
      --user-bubble:      #f0ede8;
      --ai-bubble:        #ffffff;

      /* SKILL Rule 3 & CSS Variable Standardization (Rule 7):
         --brand-accent used for the active dash in brand-color mode.
         Defaults to monochrome zinc-900 for this demo. */
      --brand-accent:     #18181b;  /* zinc-900 = monochrome active dash */
      --dash-inactive:    rgba(0, 0, 0, 0.2);
      --dash-active:      var(--brand-accent);
      --block-active:     rgba(39, 39, 42, 0.10);
      --block-hover:      rgba(39, 39, 42, 0.05);

      --panel-bg:         rgba(255, 255, 255, 0.95);
      --panel-border:     #e5e0d8;
      --panel-shadow:     0 8px 32px rgba(0, 0, 0, 0.12);

      /* SKILL Rule 5: scrollbar colors as variables */
      --scrollbar-thumb:       rgba(161, 161, 170, 0.4);
      --scrollbar-thumb-hover: rgba(161, 161, 170, 0.8);

      --tooltip-bg:       #ffffff;
      --tooltip-text:     #374151;
      --tooltip-border:   rgba(0, 0, 0, 0.1);

      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Dark mode overrides */
    .dark {
      --bg:               #0f0f10;
      --bg-panel:         #18181b;
      --border:           #27272a;
      --text-primary:     #e4e4e7;
      --text-secondary:   #a1a1aa;
      --text-muted:       #71717a;
      --user-bubble:      #1e1e22;
      --ai-bubble:        #18181b;

      /* SKILL Rule 3: Brighten brand color in dark mode for legibility */
      --brand-accent:     #e4e4e7;  /* zinc-200 */
      --dash-inactive:    rgba(255, 255, 255, 0.2);
      --dash-active:      var(--brand-accent);
      --block-active:     rgba(255, 255, 255, 0.10);
      --block-hover:      rgba(255, 255, 255, 0.05);

      --panel-bg:         rgba(24, 24, 27, 0.95);
      --panel-border:     #27272a;
      --panel-shadow:     0 8px 32px rgba(0, 0, 0, 0.45);

      --scrollbar-thumb:       rgba(82, 82, 91, 0.6);
      --scrollbar-thumb-hover: rgba(113, 113, 122, 0.8);

      --tooltip-bg:       #27272a;
      --tooltip-text:     #e4e4e7;
      --tooltip-border:   rgba(255, 255, 255, 0.05);
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    /* =========================================================
       TOP BAR
       ========================================================= */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.3s, border-color 0.3s;
    }
    .topbar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .topbar-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .dark-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-family: var(--font);
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .dark-toggle:hover { background: var(--block-hover); }

    /* =========================================================
       CHAT LAYOUT
       ========================================================= */
    .page-wrapper {
      max-width: 720px;
      margin: 0 auto;
      padding: 88px 24px 160px;
    }
    .messages {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .message-group { display: flex; flex-direction: column; gap: 6px; }
    .message-role {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      padding: 0 2px;
    }
    .message-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.75;
      color: var(--text-primary);
      transition: background 0.3s, border-color 0.3s;
    }
    .message-bubble.user {
      background: var(--user-bubble);
      border-color: transparent;
    }
    .message-bubble p + p { margin-top: 10px; }
    .message-bubble strong { font-weight: 600; }
    .message-bubble code {
      background: var(--block-active);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12.5px;
      font-family: 'SFMono-Regular', Consolas, 'Courier New', monospace;
    }
    .message-bubble ol {
      padding-left: 20px;
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* =========================================================
       TIMELINE NAVIGATOR
       SKILL Rule 4: Fixed position, pointer-events managed carefully
       ========================================================= */
    .timeline-nav {
      position: fixed;
      right: 12px;
      top: 10vh;
      bottom: 10vh;
      z-index: 50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      pointer-events: none; /* outer nav doesn't block page interaction */
    }

    .timeline-panel {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      min-height: 0;
      border: 1px solid transparent;
      background: transparent;
      box-shadow: none;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s,
                  backdrop-filter 0.3s;
    }
    .timeline-panel.expanded {
      background: var(--panel-bg);
      border-color: var(--panel-border);
      box-shadow: var(--panel-shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* SKILL Rule 4: overflow toggled by JS, NEVER by CSS :hover */
    .timeline-list {
      display: flex;
      flex-direction: column;
      padding: 16px 0;
      overflow-x: hidden;
      max-height: 320px;
      min-height: 0;
      width: 100%;
      overflow-y: hidden; /* JS will switch to 'auto' */
    }
    .timeline-list.scrollable {
      overflow-y: auto;
    }

    /* SKILL Rule 5: Inline scrollbar override (not via Tailwind arbitrary classes) */
    .timeline-list {
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) transparent;
    }
    .timeline-list::-webkit-scrollbar { width: 4px; }
    .timeline-list::-webkit-scrollbar-track { background: transparent; }
    .timeline-list::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 4px; /* SKILL Rule 5: native rounded corners */
    }
    .timeline-list::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }
    /* SKILL Rule 5: Nuke Windows scrollbar arrow buttons */
    .timeline-list::-webkit-scrollbar-button,
    .timeline-list::-webkit-scrollbar-corner {
      display: none;
      height: 0;
      width: 0;
    }

    /* SKILL Rule 1: Dense rows — 26px min-height + 1px margin = 28px total footprint */
    .timeline-node {
      display: flex;
      align-items: center;
      justify-content: flex-end; /* SKILL Rule 2: ragged-left layout via justify-end */
      min-height: 26px;
      padding: 0 12px;
      margin: 1px 8px;
      cursor: pointer;
      border-radius: 6px;
      flex-shrink: 0;
      user-select: none;
      outline: none;
      transition: background 0.15s;
    }
    .timeline-node:focus-visible {
      box-shadow: 0 0 0 2px var(--brand-accent);
    }

    /* SKILL Rule 3: Monochrome block backgrounds (NOT brand color) */
    .timeline-node.active.panel-open       { background: var(--block-active); }
    .timeline-node:not(.active).panel-open:hover { background: var(--block-hover); }

    /* SKILL Rule 2: Text label — hidden when collapsed, revealed on expand */
    .timeline-label-wrap {
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 0;
      opacity: 0;
      margin-right: 0;
      transition: width 0.3s ease, opacity 0.3s ease, margin-right 0.3s ease;
      flex-shrink: 0;
    }
    .timeline-label-wrap.visible {
      width: 13.5rem; /* ~216px */
      opacity: 1;
      margin-right: 8px; /* SKILL Rule 2: max 8px / mr-2 */
    }

    /* SKILL Rule 1: Micro typography — 12px */
    .timeline-label {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px; /* SKILL Rule 1: text-[12px] */
      max-width: 100%;
      pointer-events: none;
      color: var(--text-secondary);
    }
    .timeline-node.active .timeline-label {
      color: var(--text-primary);
      font-weight: 500;
    }

    /* SKILL Rule 2: Anchor dash — exactly 14px × 1.5px */
    .timeline-dash {
      width: 14px;
      flex-shrink: 0;
      height: 1.5px;
      border-radius: 9999px;
      background: var(--dash-inactive);
      transition: background 0.2s;
    }
    /* SKILL Rule 3: Active dash uses CSS variable (dark/light-aware) */
    .timeline-node.active .timeline-dash {
      background: var(--dash-active); /* = var(--brand-accent) */
    }

    /* =========================================================
       TOOLTIP — portal-style, positioned by JS (like createPortal)
       ========================================================= */
    .timeline-tooltip {
      position: fixed;
      z-index: 99999;
      pointer-events: none;
      padding: 10px 14px;
      font-size: 13px;
      font-family: var(--font);
      line-height: 1.5;
      background: var(--tooltip-bg);
      color: var(--tooltip-text);
      border-radius: 8px;
      border: 1px solid var(--tooltip-border);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
      max-width: 22rem;
      width: max-content;
      display: none;

      /* Clamp to 8 lines */
      display: -webkit-box;
      -webkit-line-clamp: 8;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* Tooltip arrow (pointing right, toward the timeline) */
    .timeline-tooltip::after {
      content: '';
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-left-color: var(--tooltip-border);
    }
    .timeline-tooltip::before {
      content: '';
      position: absolute;
      left: calc(100% - 1px);
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-left-color: var(--tooltip-bg);
    }

    /* =========================================================
       SKILL Rule 7: Forced-Colors (WCAG AAA) — graceful degradation
       ========================================================= */
    @media (forced-colors: active) {
      .timeline-dash                   { background: ButtonText !important; }
      .timeline-node.active .timeline-dash { background: Highlight !important; }
      .timeline-panel.expanded         { border-color: ButtonBorder !important; }
      .timeline-tooltip                { border-color: ButtonBorder !important; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div>
      <div class="topbar-title">DeepSeek Timeline UI — Demo</div>
      <div class="topbar-hint">Hover the right edge to expand the timeline navigator →</div>
    </div>
    <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">🌙 Dark Mode</button>
  </div>

  <!-- Chat content -->
  <div class="page-wrapper">
    <div class="messages" id="messagesContainer"></div>
  </div>

  <!-- Timeline Navigator (SKILL Rule 4: outer nav is pointer-events:none) -->
  <nav class="timeline-nav" id="timelineNav" aria-label="Chat History Timeline">
    <div class="timeline-panel" id="timelinePanel">
      <div
        class="timeline-list"
        id="timelineList"
        role="list"
        aria-label="Message timeline"
      ></div>
    </div>
  </nav>

  <!-- Tooltip — attached to body like React createPortal -->
  <div
    class="timeline-tooltip"
    id="timelineTooltip"
    role="tooltip"
    aria-hidden="true"
  ></div>

  <script>
    // =======================================================
    // DEMO DATA — 12 realistic messages
    // =======================================================
    const MESSAGES = [
      {
        id: 'msg-0', role: 'user',
        text: 'Can you explain how React hooks work? Specifically useEffect and useLayoutEffect — when should I use each one?'
      },
      {
        id: 'msg-1', role: 'assistant',
        html: `<p>React hooks let you use state and lifecycle features in function components.</p>
               <p><strong>useEffect</strong> runs <em>after</em> the browser paints the screen. It's perfect for things that don't need to block the visual update: fetching data, setting up event subscriptions, or logging.</p>
               <p><strong>useLayoutEffect</strong> runs synchronously after all DOM mutations but <em>before</em> the browser paints. Use it when you need to read layout measurements (like element positions or scroll heights) and immediately adjust the DOM before the user sees anything — preventing visual flicker.</p>`
      },
      {
        id: 'msg-2', role: 'user',
        text: 'So if I want to auto-scroll a container to keep the active item always visible, which hook do I use?'
      },
      {
        id: 'msg-3', role: 'assistant',
        html: `<p>Use <strong>useLayoutEffect</strong> for that. When React renders and the active item changes, the DOM updates. If you use <code>useEffect</code>, the browser might paint one frame with the wrong scroll position before your effect runs — causing a visible jump.</p>
               <p>With <code>useLayoutEffect</code>, you intercept between DOM update and paint, so the scroll correction is invisible to the user.</p>
               <p>Pair it with <code>requestAnimationFrame</code> for a double-buffer approach that guarantees layout reflow is complete before you measure element positions.</p>`
      },
      {
        id: 'msg-4', role: 'user',
        text: 'What exactly is requestAnimationFrame and why does pairing it with useLayoutEffect matter?'
      },
      {
        id: 'msg-5', role: 'assistant',
        html: `<p><code>requestAnimationFrame</code> (rAF) schedules a callback to run right before the next repaint. By then, the browser has finished all layout calculations for that frame.</p>
               <p>In our scroll scenario:</p>
               <ol>
                 <li><code>useLayoutEffect</code> fires after DOM mutation</li>
                 <li>We schedule via <code>rAF</code> — layout reflow is guaranteed complete</li>
                 <li>We safely call <code>getBoundingClientRect()</code> — no stale measurements</li>
                 <li>We call <code>scrollTo({ behavior: 'instant' })</code> and the user sees nothing</li>
               </ol>`
      },
      {
        id: 'msg-6', role: 'user',
        text: 'Now explain WAI-ARIA — what does it do and why does a timeline navigator need it?'
      },
      {
        id: 'msg-7', role: 'assistant',
        html: `<p>WAI-ARIA adds semantic meaning to HTML elements that lack it by default.</p>
               <p>For our timeline navigator: a <code>&lt;div&gt;</code> acting as a button has no keyboard accessibility out of the box. Adding <code>role="button"</code> and <code>tabIndex={0}</code> tells the browser and screen readers "this is interactive."</p>
               <p><code>aria-current="true"</code> marks the active item. <code>role="navigation"</code> on the outer wrapper lets screen reader users jump directly to the timeline via their landmark shortcuts. Without these, keyboard-only users and screen reader users cannot use the UI at all.</p>`
      },
      {
        id: 'msg-8', role: 'user',
        text: 'How does useMemo help with the scroll mask gradient? When should I reach for it?'
      },
      {
        id: 'msg-9', role: 'assistant',
        html: `<p><code>useMemo</code> caches the result of a computation between renders, only recalculating when dependencies change.</p>
               <p>The scroll mask uses a <code>linear-gradient</code> string that varies based on whether the user is at the top or bottom of the list. Without memoization, React would rebuild that string on every render — even if nothing changed — causing unnecessary style recalculations in the browser.</p>
               <p>With <code>useMemo</code>, if <code>isTop</code> and <code>isBottom</code> haven't changed, the same object reference is returned and React skips the DOM style update entirely. In vanilla JS, we replicate this by checking state before recomputing the string.</p>`
      },
      {
        id: 'msg-10', role: 'user',
        text: 'Last question: why inject the scrollbar styles as a <style> tag inside the component instead of using Tailwind?'
      },
      {
        id: 'msg-11', role: 'assistant',
        html: `<p>Reliability in complex Chromium environments. Tailwind's arbitrary pseudo-class extensions (like <code>[&::-webkit-scrollbar]:w-1</code>) can be stripped or overridden by the host page's CSS reset — especially in browser extensions where content script CSS is injected into third-party pages.</p>
               <p>By injecting a raw <code>&lt;style&gt;</code> block directly:</p>
               <ol>
                 <li>Styles survive any Tailwind purge or PostCSS transform</li>
                 <li>You can target <code>::-webkit-scrollbar-button { display: none }</code> to kill Windows arrow buttons</li>
                 <li>The 4px transparent-track thumb gives you a macOS-style overlay scrollbar that floats without eating layout space</li>
               </ol>`
      },
    ];

    // =======================================================
    // RENDER MESSAGES
    // =======================================================
    const messagesContainer = document.getElementById('messagesContainer');

    MESSAGES.forEach(msg => {
      const group = document.createElement('div');
      group.className = 'message-group';
      group.id = msg.id;

      const roleEl = document.createElement('div');
      roleEl.className = 'message-role';
      roleEl.textContent = msg.role === 'user' ? 'You' : 'Assistant';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble' + (msg.role === 'user' ? ' user' : '');
      if (msg.html) {
        bubble.innerHTML = msg.html;
      } else {
        bubble.innerHTML = `<p>${msg.text
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/`(.*?)`/g, '<code>$1</code>')
        }</p>`;
      }

      group.appendChild(roleEl);
      group.appendChild(bubble);
      messagesContainer.appendChild(group);
    });

    // =======================================================
    // TIMELINE: STATE
    // =======================================================
    const timelineNav   = document.getElementById('timelineNav');
    const timelinePanel = document.getElementById('timelinePanel');
    const timelineList  = document.getElementById('timelineList');
    const tooltip       = document.getElementById('timelineTooltip');

    let isExpanded      = false;
    let activeIndex     = 0;
    let hoveredNodeId   = null;
    let hoverTimeout    = null;
    // Memoized scroll state (SKILL Rule 7: useMemo equivalent — skip recalc if unchanged)
    let cachedIsTop     = true;
    let cachedIsBottom  = true;

    // Build node data from messages
    const nodes = MESSAGES.map((msg, i) => ({
      id: msg.id,
      index: i,
      role: msg.role,
      // Strip HTML tags for plain-text label and tooltip
      text: (msg.text || msg.html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ')).trim().slice(0, 120),
    }));

    // =======================================================
    // RENDER TIMELINE NODES
    // =======================================================
    nodes.forEach((node, i) => {
      const el = document.createElement('div');
      el.className = 'timeline-node' + (i === 0 ? ' active' : '');
      // SKILL Rule 7: Native A11y — role, tabIndex, aria-*
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-label', node.text || 'Timeline node');
      el.setAttribute('data-node-index', String(i));
      if (i === 0) el.setAttribute('aria-current', 'true');

      // Label container (hidden width=0 when collapsed)
      const labelWrap = document.createElement('div');
      labelWrap.className = 'timeline-label-wrap';
      labelWrap.setAttribute('aria-hidden', 'true');

      const label = document.createElement('span');
      label.className = 'timeline-label';
      label.textContent = node.text || '…';
      labelWrap.appendChild(label);

      // SKILL Rule 2: Anchor dash — 14px × 1.5px
      const dash = document.createElement('div');
      dash.className = 'timeline-dash';

      el.appendChild(labelWrap);
      el.appendChild(dash);
      timelineList.appendChild(el);

      // Click → SKILL Rule 6: behavior: 'instant'
      el.addEventListener('click', () => scrollToNode(i));

      // SKILL Rule 7: Keyboard nav — Enter / Space
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          scrollToNode(i);
        }
      });

      // Tooltip with 600ms delay (matching Timeline.tsx line 176-178)
      el.addEventListener('mouseenter', () => {
        if (!isExpanded) return;
        clearTimeout(hoverTimeout);
        hoverTimeout = setTimeout(() => {
          const rect = el.getBoundingClientRect();
          showTooltip(node, rect);
        }, 600);
      });

      el.addEventListener('mouseleave', () => {
        clearTimeout(hoverTimeout);
        if (hoveredNodeId === node.id) hideTooltip();
      });
    });

    // =======================================================
    // ACTIVE NODE: detect from page scroll position
    // =======================================================
    function detectActiveByScroll() {
      const scrollY = window.scrollY + window.innerHeight * 0.35;
      let best = 0;
      nodes.forEach((node, i) => {
        const msgEl = document.getElementById(node.id);
        if (msgEl && msgEl.offsetTop <= scrollY) best = i;
      });
      if (best !== activeIndex) setActiveIndex(best);
    }

    window.addEventListener('scroll', detectActiveByScroll, { passive: true });

    // =======================================================
    // SET ACTIVE INDEX
    // Mirrors useLayoutEffect + rAF from Timeline.tsx lines 37-63
    // =======================================================
    function setActiveIndex(i) {
      // Clear old active
      const nodeEls = timelineList.querySelectorAll('.timeline-node');
      nodeEls.forEach(n => {
        n.classList.remove('active');
        n.removeAttribute('aria-current');
      });

      activeIndex = i;
      const activeEl = nodeEls[i];
      if (activeEl) {
        activeEl.classList.add('active');
        activeEl.setAttribute('aria-current', 'true');
      }

      // SKILL Rule 7: rAF double-buffer — ensure layout reflow is complete
      // before measuring and scrolling the timeline list
      requestAnimationFrame(() => {
        if (!activeEl) return;
        const containerRect = timelineList.getBoundingClientRect();
        const nodeRect      = activeEl.getBoundingClientRect();
        const nodeCenter    = nodeRect.top + nodeRect.height / 2;
        const containerCenter = containerRect.top + containerRect.height / 2;
        const tolerance     = containerRect.height * 0.3;

        if (Math.abs(nodeCenter - containerCenter) > tolerance) {
          const target = activeEl.offsetTop
            - timelineList.clientHeight / 2
            + activeEl.clientHeight / 2;
          // SKILL Rule 6: behavior: 'instant' — no sluggish cinematic scrolling
          timelineList.scrollTo({ top: Math.max(0, target), behavior: 'instant' });
        }

        setTimeout(updateScrollMask, 100);
      });
    }

    // =======================================================
    // SCROLL TO MESSAGE NODE (SKILL Rule 6)
    // =======================================================
    function scrollToNode(i) {
      const msgEl = document.getElementById(nodes[i].id);
      if (!msgEl) return;
      // SKILL Rule 6: 'instant' — not 'smooth'
      msgEl.scrollIntoView({ behavior: 'instant', block: 'start' });
      setActiveIndex(i);
    }

    // =======================================================
    // EXPAND / COLLAPSE PANEL
    // SKILL Rule 4: overflow toggled explicitly via JS, NEVER via CSS :hover
    // =======================================================
    function setExpanded(val) {
      isExpanded = val;
      timelinePanel.classList.toggle('expanded', val);

      // SKILL Rule 4: DOM-level overflow toggle
      timelineList.classList.toggle('scrollable', val);

      // Show / hide labels and hover backgrounds
      timelineList.querySelectorAll('.timeline-label-wrap').forEach(lw => {
        lw.classList.toggle('visible', val);
      });
      timelineList.querySelectorAll('.timeline-node').forEach(n => {
        n.classList.toggle('panel-open', val);
      });

      if (val) {
        // Reset cached state so mask recomputes on first expand
        cachedIsTop = cachedIsBottom = null;
        updateScrollMask();
      } else {
        // Remove mask when collapsed — no fading needed
        timelineList.style.maskImage = '';
        timelineList.style.webkitMaskImage = '';
        hideTooltip();
      }
    }

    timelineNav.addEventListener('mouseenter', () => setExpanded(true));
    timelineNav.addEventListener('mouseleave', () => {
      setExpanded(false);
      clearTimeout(hoverTimeout);
      hideTooltip();
    });

    // =======================================================
    // SCROLL MASK (top/bottom fade gradient)
    // SKILL Rule 7: useMemo equivalent — skip DOM update if state unchanged
    // =======================================================
    function updateScrollMask() {
      const el       = timelineList;
      const isTop    = el.scrollTop <= 5;
      const isBottom = Math.ceil(el.scrollTop + el.clientHeight) >= el.scrollHeight - 5;

      // Early exit if nothing changed (memoization)
      if (isTop === cachedIsTop && isBottom === cachedIsBottom) return;
      cachedIsTop    = isTop;
      cachedIsBottom = isBottom;

      const topStop    = isTop    ? 'black 0px'  : 'transparent 0px';
      const bottomStop = isBottom ? 'black 100%' : 'transparent 100%';
      const gradient   = `linear-gradient(to bottom, ${topStop}, black 40px, black calc(100% - 40px), ${bottomStop})`;

      el.style.maskImage       = gradient;
      el.style.webkitMaskImage = gradient;
    }

    timelineList.addEventListener('scroll', () => {
      clearTimeout(hoverTimeout);
      hideTooltip();
      updateScrollMask();
    }, { passive: true });

    // =======================================================
    // TOOLTIP (portal-style — positioned by JS, attached to body)
    // Mirrors createPortal in Timeline.tsx lines 213-241
    // =======================================================
    function showTooltip(node, rect) {
      hoveredNodeId = node.id;
      tooltip.textContent = node.text;
      tooltip.style.display = 'block';
      // Position: vertically centered on the hovered node, to the left
      tooltip.style.top       = (rect.top + rect.height / 2) + 'px';
      tooltip.style.left      = (rect.left - 12) + 'px';
      tooltip.style.transform = 'translate(-100%, -50%)';
      tooltip.removeAttribute('aria-hidden');
      tooltip.style.display   = '-webkit-box'; // restore clamp display
    }

    function hideTooltip() {
      hoveredNodeId = null;
      tooltip.style.display = 'none';
      tooltip.setAttribute('aria-hidden', 'true');
    }

    // =======================================================
    // DARK MODE TOGGLE
    // =======================================================
    function toggleDark() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      document.getElementById('darkToggle').textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
    }

    // Init
    updateScrollMask();
  </script>
</body>
</html>
